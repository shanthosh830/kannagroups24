{% extends "admin/layout.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
  <div class="page-header">
    <h1>Login</h1>
  </div>

  <form class="form" method="post" action="{{ url_for('admin.login_post') }}">
    {{ form.hidden_tag() }}
    <label>
      {{ form.email.label }}
      {{ form.email(class_="input", placeholder="kannagroups24@gmail.com") }}
    </label>
    <label>
      {{ form.password.label }}
      {{ form.password(class_="input") }}
    </label>
    <button class="btn" type="submit">Login</button>
  </form>

  {% if not current_user.is_authenticated %}
    <div class="note">
      First time setup? Go to <a href="{{ url_for('admin.bootstrap') }}">/admin/bootstrap</a>
    </div>
  {% endif %}
{% endblock %}
