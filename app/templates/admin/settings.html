{% extends "admin/layout.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
  <div class="page-header">
    <h1>Settings</h1>
    <p class="muted">Business info + UPI QR used on checkout/payment pages (Option A uses QR).</p>
  </div>

  <form class="form" method="post" enctype="multipart/form-data" action="{{ url_for('admin.settings_post') }}">
    {{ form.hidden_tag() }}
    <label>
      {{ form.business_name.label }}
      {{ form.business_name(class_="input") }}
    </label>
    <label>
      {{ form.whatsapp_number.label }}
      {{ form.whatsapp_number(class_="input") }}
    </label>
    <label>
      {{ form.email.label }}
      {{ form.email(class_="input") }}
    </label>
    <label>
      {{ form.location.label }}
      {{ form.location(class_="input") }}
    </label>
    <label>
      {{ form.upi_id.label }}
      {{ form.upi_id(class_="input", placeholder="example@upi") }}
    </label>
    <label>
      {{ form.upi_qr.label }}
      {{ form.upi_qr(class_="input") }}
      {% if upi_qr_filename %}
        <div class="muted small">Current QR: <a href="{{ img_url(upi_qr_filename) }}" target="_blank" rel="noreferrer">{{ upi_qr_filename }}</a></div>
      {% endif %}
    </label>
    <button class="btn" type="submit">Save</button>
  </form>
{% endblock %}
